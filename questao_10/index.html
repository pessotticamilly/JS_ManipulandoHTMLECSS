<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 10</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
</head>
<body>
    <main>
        <div class="container d-flex justify-content-center d-flex justify-content-center">
            <div class="row g-3">
                <div class="col-12">
                    <h1>Questão 10 - Cartão de apresentação</h1>
                </div>
                <div class="col-12">
                    <div id="divForm" class="d-block">
                        <form id="form" class="row g-3">
                            <div class="col-12">
                                <h3>Dados Pessoais</h3>
                            </div>
                            <div class="col-8">
                                <label for="fullNameInput" class="form-label">Nome completo:</label>
                                <input id="fullNameInput" class="form-control" type="text" required>
                            </div>
                            <div class="col-4">
                                <label for="cpfInput" class="form-label">CPF:</label>
                                <input id="cpfInput" class="form-control" type="number" required>
                            </div>
                            <div class="col-7">
                                <label for="emailInput" class="form-label">E-mail:</label>
                                <input id="emailInput" class="form-control" type="email" required>
                            </div>
                            <div class="col-5 pb-3">
                                <label for="telephoneInput" class="form-label">Telefone:</label>
                                <input id="telephoneInput" class="form-control" type="number" required>
                            </div>
                            <div class="col-12">
                                <h3>Endereço</h3>
                            </div>
                            <div class="col-4">
                                <label for="countryInput" class="form-label">País:</label>
                                <input id="countryInput" class="form-control" type="text" required>
                            </div>
                            <div class="col-4">
                                <label for="stateInput" class="form-label">Estado:</label>
                                <input id="stateInput" class="form-control" type="text" required>
                            </div>
                            <div class="col-4">
                                <label for="cityInput" class="form-label">Cidade:</label>
                                <input id="cityInput" class="form-control" type="text" required>
                            </div>
                            <div class="col-5">
                                <label for="neighborhoodInput" class="form-label">Bairro:</label>
                                <input id="neighborhoodInput" class="form-control" type="text" required>
                            </div>
                            <div class="col-5">
                                <label for="streetInput" class="form-label">Rua/Logradouro:</label>
                                <input id="streetInput" class="form-control" type="text" required>
                            </div>
                            <div class="col-2 pb-3">
                                <label for="numberInput" class="form-label">Número:</label>
                                <input id="numberInput" class="form-control" type="number" required>
                            </div>
                            <div class="col-12 d-flex justify-content-center">
                                <button id="sendButton" class="btn btn-primary d-block" type="submit">Enviar</button>
                            </div>
                        </form>
                    </div>
                    <div id="divCard" class="d-none"></div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
