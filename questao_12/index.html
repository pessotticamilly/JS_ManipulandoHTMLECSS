<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 12</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="row g-3">
            <div class="col-12">
                <h1>Questão 12 - Tema Dark Mode</h1>
            </div>
            <div class="col-12 d-flex align-items-center">
                <label class="form-check-label" for="themeSwitch">
                    <i class="bi bi-brightness-high-fill"></i>
                </label>
                <div class="form-check form-switch d-flex justify-content-center align-items-center mx-2">
                    <input id="themeSwitch" class="form-check-input" type="checkbox" role="switch">
                </div>
                <label class="form-check-label" for="themeSwitch">
                    <i class="bi bi-moon-fill"></i>
                </label>
            </div>
            <div class="col-12">
                <p>Mais um texto para testar</p>
            </div>
        </div>
    </div>
</body>
</html>
